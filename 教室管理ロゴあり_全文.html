<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>G-ZERO 残数確認</title>

  <!-- ホーム画面に追加した時のアイコン設定（iOS / Android 共通） -->
  <link rel="apple-touch-icon" href="https://lh3.googleusercontent.com/d/1iIk_JR6wOcPWC8sY4WiM6VsrebYwsEvw=s512">
  <link rel="icon" type="image/jpeg" href="https://lh3.googleusercontent.com/d/1iIk_JR6wOcPWC8sY4WiM6VsrebYwsEvw=s512">
  <link rel="manifest" href="https://script.google.com/macros/s/AKfycbzBOLZmtQQb4We7rqrYMC60jaxvRUM_a8oXp9eiqP54/dev?manifest=1">

  <style>
    body {
      font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", sans-serif;
      text-align: center;
      background-color: #ffe4e1;
      margin: 0;
      padding: 20px;
      color: #4a4a4a;
    }

    .container {
      max-width: 400px;
      margin: auto;
      background: white;
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
    }

    h1 { color: #4169e1; font-size: 1.8rem; margin-bottom: 5px; font-weight: bold; }
    .sub-title { color: #4169e1; font-size: 1.1rem; font-weight: bold; margin-bottom: 25px; }

    /* 入力欄のデザイン（矢印を完全に消去） */
    input {
      width: 85%;
      padding: 15px;
      font-size: 1.4rem;
      border: 3px solid #ff69b4;
      border-radius: 12px;
      margin-bottom: 20px;
      text-align: center;
      outline: none;
      -webkit-appearance: none;
      appearance: none;
      margin: 0;
    }
    input[type="number"] {
      -moz-appearance: textfield;
    }
    input::-webkit-outer-spin-button,
    input::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }

    #searchBtn {
      background: #ff69b4;
      color: white;
      border: none;
      padding: 16px;
      font-size: 1.2rem;
      border-radius: 12px;
      cursor: pointer;
      width: 95%;
      font-weight: bold;
    }

    #result { margin-top: 30px; padding: 20px; border-radius: 15px; display: none; background-color: #fffafa; border: 1px solid #ffdae0; }
    .count-box { font-size: 3.2rem; font-weight: bold; color: #ff69b4; margin: 10px 0; }
    #checkinBtn { background: #27ae60; color: white; border: none; padding: 16px; font-size: 1.2rem; border-radius: 12px; width: 95%; font-weight: bold; margin-top: 20px; }
    #msg { font-weight: bold; margin-top: 15px; margin-bottom: 5px; }
    #timestamp { font-size: 0.85rem; color: #888; }
  </style>
</head>
<body>

<div class="container">
  <h1>Gravity ZERO</h1>
  <div class="sub-title">チケット残り枚数</div>

  <div id="login-section">
    <p>会員IDを入力してください</p>
    <input type="number" id="userId" placeholder="" inputmode="numeric">
    <br>
    <button id="searchBtn" onclick="checkBalance()">残数を確認する</button>
  </div>

  <div id="result">
    <div id="userName" style="font-size: 1.2rem; color: #4169e1; font-weight: bold;"></div>
    <div style="font-size: 0.9rem; color: #7f8c8d;">現在の残数</div>
    <div class="count-box"><span id="countDisplay">0</span><span style="font-size: 1.2rem; margin-left: 5px;">枚</span></div>
    <button id="checkinBtn" onclick="checkIn()">1回受講する</button>
    <p id="msg"></p>
    <div id="timestamp"></div>
    <div id="notice" style="font-size: 0.9rem; color: #e74c3c; font-weight: bold; margin-top: 10px; display: none;">２人以降は画面を更新してください</div>
  </div>
</div>

<script>
  function checkBalance() {
    const id = document.getElementById('userId').value;
    if (!id) return;
    const btn = document.getElementById('searchBtn');
    btn.innerText = '照合中...';
    btn.disabled = true;

    google.script.run
      .withSuccessHandler(function(data) {
        btn.innerText = '残数を確認する';
        btn.disabled = false;
        const resultDiv = document.getElementById('result');
        if (data) {
          resultDiv.style.display = 'block';
          document.getElementById('userName').innerText = data.name + " 選手";
          document.getElementById('countDisplay').innerText = data.balance;
          document.getElementById('msg').innerText = "";
          document.getElementById('timestamp').innerText = "";
          document.getElementById('notice').style.display = "none";
          document.getElementById('checkinBtn').style.display = 'block';
        } else {
          alert("IDが見つかりません");
        }
      })
      .getUserData(id);
  }

  function checkIn() {
    const id = document.getElementById('userId').value;
    const btn = document.getElementById('checkinBtn');
    btn.innerText = '更新中...';
    btn.disabled = true;

    google.script.run
      .withSuccessHandler(function(response) {
        if(response.success) {
          document.getElementById('countDisplay').innerText = response.newBalance;
          document.getElementById('msg').innerText = "受講を受け付けました！";
          document.getElementById('msg').style.color = "#27ae60";

          const now = new Date();
          const timeStr = now.getFullYear() + "/" + (now.getMonth() + 1) + "/" + now.getDate() + " " +
                          now.getHours().toString().padStart(2, '0') + ":" +
                          now.getMinutes().toString().padStart(2, '0');
          document.getElementById('timestamp').innerText = "受講日時: " + timeStr;
          document.getElementById('notice').style.display = "block";
          btn.style.display = 'none';
        } else {
          alert(response.message);
          btn.innerText = '1回受講する';
          btn.disabled = false;
        }
      })
      .processCheckIn(id);
  }
</script>

</body>
</html>
