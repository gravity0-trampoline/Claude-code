<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gravity ZERO | デジタル回数券</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="グラゼロ教室アイコン.jpg">
<link rel="icon" type="image/jpeg" href="グラゼロ教室アイコン.jpg">
<style>
  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    font-family: "Hiragino Kaku Gothic ProN", "Hiragino Sans", "Yu Gothic", "Meiryo", sans-serif;
    background: linear-gradient(160deg, #ffe3da 0%, #fff3f0 45%, #ffffff 100%);
  }

  .card {
    width: 100%;
    max-width: 360px;
    background: #ffffff;
    border-radius: 28px;
    box-shadow: 0 12px 32px rgba(0, 0, 0, 0.08);
    padding: 36px 28px;
    text-align: center;
  }

  h1 {
    margin: 0 0 6px;
    font-size: 42px;
    color: #4169e1;
    letter-spacing: 0.5px;
  }

  .tagline {
    margin: 0 0 8px;
    font-size: 21px;
    font-weight: bold;
    color: #ff69b4;
  }

  .subtitle {
    margin: 0 0 22px;
    font-size: 21px;
    font-weight: bold;
    color: #444;
  }

  label {
    display: block;
    text-align: center;
    font-size: 17px;
    color: #666;
    margin-bottom: 8px;
  }

  #codeInput {
    width: 100%;
    padding: 14px 16px;
    margin-bottom: 18px;
    font-size: 20px;
    letter-spacing: 6px;
    text-align: center;
    color: #333;
    background: #ffffff;
    border: 4px solid #ff69b4;
    border-radius: 16px;
    outline: none;
  }

  #checkButton {
    width: 100%;
    padding: 16px;
    font-size: 16px;
    font-weight: bold;
    color: #ffffff;
    background: #ff69b4;
    border: none;
    border-radius: 16px;
    cursor: pointer;
  }

  #result {
    display: none;
    margin-top: 24px;
    padding: 20px;
    background: #fffafa;
    border: 1px solid #ffdae0;
    border-radius: 15px;
  }

  #userName {
    font-size: 1.6rem;
    color: #ff69b4;
    font-weight: bold;
    margin-bottom: 6px;
  }

  .result-label {
    font-size: 1.2rem;
    color: #555555;
    margin-bottom: 4px;
  }

  .count-box {
    font-size: 5rem;
    display: flex;
    align-items: baseline;
    justify-content: center;
    font-weight: bold;
    color: #ff69b4;
    margin: 10px 0;
  }

  .count-box span:last-child {
    font-size: 2rem;
    line-height: 1;
    margin-left: 5px;
  }

  #checkinBtn {
    width: 100%;
    background: #2ecc71;
    color: white;
    border: none;
    padding: 16px;
    font-size: 1.2rem;
    border-radius: 12px;
    font-weight: bold;
    margin-top: 16px;
    cursor: pointer;
  }

  #msg {
    font-weight: bold;
    margin-top: 15px;
    color: #27ae60;
  }

  #notice {
    font-size: 0.9rem;
    color: #e74c3c;
    font-weight: bold;
    margin-top: 10px;
    display: none;
  }

  .message {
    min-height: 20px;
    margin: 16px 0 0;
    font-size: 14px;
  }

  .message.error { color: #d6483b; }
  .message.warning { color: #d6863b; }

  #growth-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.45);
    display: none;
    align-items: center;
    justify-content: center;
    padding: 24px;
    z-index: 650;
    opacity: 0;
    transition: opacity 0.4s ease;
    cursor: pointer;
  }
  #growth-overlay.show {
    display: flex;
    opacity: 1;
  }
  .growth-card {
    background: rgba(20, 10, 35, 0.55);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    border: 1px solid rgba(255, 255, 255, 0.18);
    border-radius: 28px;
    padding: 46px 30px;
    max-width: 340px;
    width: 100%;
    text-align: center;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
    transform: scale(0.55);
    transition: transform 0.55s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  #growth-overlay.show .growth-card {
    transform: scale(1);
  }
  .growth-emoji {
    font-size: 56px;
    margin-bottom: 10px;
    animation: growthBounce 1.2s ease-in-out infinite;
  }
  .growth-title {
    font-size: 30px;
    font-weight: 900;
    line-height: 1.35;
    margin: 0;
    background: linear-gradient(135deg, #ff9ecb 0%, #ffd27a 50%, #fff2b0 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    -webkit-text-fill-color: transparent;
    text-shadow: 0 0 30px rgba(255, 255, 255, 0.25);
  }
  @keyframes growthBounce {
    0%, 100% { transform: translateY(0) scale(1); }
    50% { transform: translateY(-8px) scale(1.08); }
  }

  #firework-canvas {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 800;
    opacity: 0;
    transition: opacity 0.4s ease;
  }
  #firework-canvas.show { opacity: 1; }
</style>
</head>
<body>
  <div class="card">
    <h1>Gravity ZERO</h1>
    <p class="tagline">ートランポリン教室ー</p>
    <p class="subtitle">チケット残り枚数</p>

    <div id="login-section">
      <label for="codeInput">会員IDを入力してください</label>
      <input type="text" id="codeInput" inputmode="numeric" maxlength="4" autocomplete="off">
      <button id="checkButton" type="button">残数を確認する</button>
      <p class="message" id="message"></p>
    </div>

    <div id="result">
      <div id="userName"></div>
      <div class="result-label">現在の残数</div>
      <div class="count-box"><span id="countDisplay">0</span><span>枚</span></div>
      <button id="checkinBtn" type="button">1回受講する</button>
      <p id="msg"></p>
      <div id="notice">２人以降は画面を更新してください</div>
    </div>
  </div>

  <canvas id="firework-canvas"></canvas>

  <div id="growth-overlay">
    <div class="growth-card">
      <div class="growth-emoji">🌱🎉</div>
      <div class="growth-title">また、一歩<br>成長しました！</div>
    </div>
  </div>

<script>
  var API_URL = "https://script.google.com/macros/s/AKfycbyXM_CR2Ai4x3LBwpQujinXDcayLgdG2jrBhYDhASGGXM6YOweBCdnYxuP_kvqzl5IdHw/exec";
  var currentCode = "";

  function callAPI(params, callback) {
    var script = document.createElement("script");
    var cbName = "cb_" + Date.now();
    window[cbName] = function(data) {
      delete window[cbName];
      document.head.removeChild(script);
      callback(null, data);
    };
    script.onerror = function() {
      delete window[cbName];
      document.head.removeChild(script);
      callback(new Error("通信エラー"));
    };
    script.src = API_URL + "?" + params + "&callback=" + cbName;
    document.head.appendChild(script);
  }

  var codeInput = document.getElementById("codeInput");
  var checkButton = document.getElementById("checkButton");
  var messageEl = document.getElementById("message");
  var resultDiv = document.getElementById("result");
  var loginSection = document.getElementById("login-section");
  var userNameEl = document.getElementById("userName");
  var countDisplayEl = document.getElementById("countDisplay");
  var checkinBtn = document.getElementById("checkinBtn");
  var msgEl = document.getElementById("msg");
  var noticeEl = document.getElementById("notice");

  checkButton.addEventListener("click", function() {
    var code = codeInput.value.trim();
    if (!/^\d{4}$/.test(code)) {
      messageEl.textContent = "4桁の数字を入力してください。";
      messageEl.className = "message error";
      return;
    }
    currentCode = code;
    checkButton.disabled = true;
    messageEl.textContent = "確認しています…";
    messageEl.className = "message";

    callAPI("action=check&code=" + encodeURIComponent(code), function(err, result) {
      checkButton.disabled = false;
      if (err || !result) {
        messageEl.textContent = "通信エラーが発生しました。";
        messageEl.className = "message error";
        return;
      }
      if (!result.found) {
        messageEl.textContent = "登録されていない番号です。スタッフにお問い合わせください。";
        messageEl.className = "message error";
        return;
      }
      loginSection.style.display = "none";
      resultDiv.style.display = "block";
      userNameEl.textContent = result.name + " 選手";
      countDisplayEl.textContent = result.remaining;
      checkinBtn.style.display = "block";
      checkinBtn.disabled = false;
      checkinBtn.textContent = "1回受講する";
      msgEl.textContent = "";
      noticeEl.style.display = "none";
    });
  });

  var fireworkCanvas = document.getElementById("firework-canvas");
  var fireworkCtx = fireworkCanvas.getContext("2d");
  var fireworkAnimationId = null;
  var fireworkClearTimer = null;
  var FIREWORK_SHELL_COUNT = 9;
  var FIREWORK_FINALE_COUNT = 3;
  var FIREWORK_DURATION = 5400;
  var FIREWORK_GRAVITY = 0.045;
  var FIREWORK_COLORS = ["#ff69b4", "#4169e1", "#ffd700", "#2ecc71", "#ff8c69", "#ff4d4d", "#66d9ff", "#c084fc", "#ff3df0", "#39ff14"];

  function makeFireworkShell(w, h, delay) {
    var x = w * (0.12 + Math.random() * 0.76);
    return {
      x: x,
      y: h,
      prevX: x,
      prevY: h,
      targetY: h * (0.12 + Math.random() * 0.32),
      vy: -(7.5 + Math.random() * 3.5),
      color: FIREWORK_COLORS[Math.floor(Math.random() * FIREWORK_COLORS.length)],
      secondaryColor: FIREWORK_COLORS[Math.floor(Math.random() * FIREWORK_COLORS.length)],
      delay: delay,
      exploded: false
    };
  }

  function createFireworkShells() {
    var w = fireworkCanvas.width;
    var h = fireworkCanvas.height;
    var shells = [];
    var mainCount = FIREWORK_SHELL_COUNT - FIREWORK_FINALE_COUNT;
    for (var i = 0; i < mainCount; i++) {
      shells.push(makeFireworkShell(w, h, i * 340 + Math.random() * 260));
    }
    // フィナーレ: 最後の数発をほぼ同時に打ち上げて締めくくる
    var finaleBase = mainCount * 340 + 500;
    for (var j = 0; j < FIREWORK_FINALE_COUNT; j++) {
      shells.push(makeFireworkShell(w, h, finaleBase + Math.random() * 150));
    }
    return shells;
  }

  function explodeShell(shell, particles, flashes, elapsed) {
    shell.exploded = true;
    flashes.push({ x: shell.x, y: shell.y, time: elapsed, color: shell.color });
    var count = 90 + Math.floor(Math.random() * 30);
    var angleOffset = Math.random() * Math.PI * 2;
    for (var i = 0; i < count; i++) {
      // 角度を360度均等に割り振り、速度を連続的にばらつかせることで
      // 同心円の段差が出ない、隙間のない球状の爆発にする
      var angle = angleOffset + (Math.PI * 2 * i) / count + (Math.random() - 0.5) * ((Math.PI * 2) / count) * 0.6;
      var speed = 2.5 + Math.random() * 5.5;
      particles.push({
        x: shell.x,
        y: shell.y,
        prevX: shell.x,
        prevY: shell.y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        color: i % 2 === 0 ? shell.color : shell.secondaryColor,
        size: 1.4 + speed * 0.28,
        life: 1,
        decay: 0.007 + Math.random() * 0.011,
        twinkle: Math.random() < 0.4
      });
    }
  }

  function hexToRgbString(hex) {
    var h = hex.replace("#", "");
    var r = parseInt(h.substring(0, 2), 16);
    var g = parseInt(h.substring(2, 4), 16);
    var b = parseInt(h.substring(4, 6), 16);
    return r + "," + g + "," + b;
  }

  function drawFireworkFlashes(flashes, elapsed) {
    flashes.forEach(function(f) {
      var t = (elapsed - f.time) / 350;
      if (t < 0 || t > 1) return;
      var radius = 10 + t * 90;
      var alpha = (1 - t) * 0.9;
      var rgb = hexToRgbString(f.color);
      // 全ての色停止点を同じalphaでフェードさせ、途中に不透明な輪が残らないようにする
      var gradient = fireworkCtx.createRadialGradient(f.x, f.y, 0, f.x, f.y, radius);
      gradient.addColorStop(0, "rgba(255,255,255," + alpha + ")");
      gradient.addColorStop(0.4, "rgba(" + rgb + "," + alpha + ")");
      gradient.addColorStop(1, "rgba(" + rgb + ",0)");
      fireworkCtx.fillStyle = gradient;
      fireworkCtx.beginPath();
      fireworkCtx.arc(f.x, f.y, radius, 0, Math.PI * 2);
      fireworkCtx.fill();
    });
  }

  function stepFirework(timestamp, shells, particles, flashes, startRef, onFirstExplosion) {
    if (!startRef.time) startRef.time = timestamp;
    var elapsed = timestamp - startRef.time;
    fireworkCtx.clearRect(0, 0, fireworkCanvas.width, fireworkCanvas.height);

    drawFireworkFlashes(flashes, elapsed);

    shells.forEach(function(shell) {
      if (shell.exploded) return;
      var localElapsed = elapsed - shell.delay;
      if (localElapsed <= 0) return;
      shell.prevX = shell.x;
      shell.prevY = shell.y;
      shell.y += shell.vy;

      fireworkCtx.save();
      fireworkCtx.globalAlpha = 0.9;
      fireworkCtx.shadowBlur = 12;
      fireworkCtx.shadowColor = shell.color;
      fireworkCtx.strokeStyle = shell.color;
      fireworkCtx.lineWidth = 2.5;
      fireworkCtx.lineCap = "round";
      fireworkCtx.beginPath();
      fireworkCtx.moveTo(shell.prevX, shell.prevY);
      fireworkCtx.lineTo(shell.x, shell.y);
      fireworkCtx.stroke();
      fireworkCtx.fillStyle = "#ffffff";
      fireworkCtx.beginPath();
      fireworkCtx.arc(shell.x, shell.y, 2, 0, Math.PI * 2);
      fireworkCtx.fill();
      fireworkCtx.restore();

      if (shell.y <= shell.targetY) {
        explodeShell(shell, particles, flashes, elapsed);
        if (!startRef.firstExplosionFired) {
          startRef.firstExplosionFired = true;
          if (onFirstExplosion) onFirstExplosion();
        }
      }
    });

    particles.forEach(function(p) {
      if (p.life <= 0) return;
      p.prevX = p.x;
      p.prevY = p.y;
      p.vy += FIREWORK_GRAVITY;
      p.vx *= 0.98;
      p.vy *= 0.99;
      p.x += p.vx;
      p.y += p.vy;
      p.life -= p.decay;

      var alpha = Math.max(0, p.life);
      if (p.twinkle && p.life < 0.55) {
        alpha *= 0.3 + 0.7 * Math.random();
      }

      fireworkCtx.save();
      fireworkCtx.globalAlpha = alpha;
      fireworkCtx.shadowBlur = 8;
      fireworkCtx.shadowColor = p.color;
      fireworkCtx.strokeStyle = p.color;
      fireworkCtx.lineWidth = p.size;
      fireworkCtx.lineCap = "round";
      fireworkCtx.beginPath();
      fireworkCtx.moveTo(p.prevX, p.prevY);
      fireworkCtx.lineTo(p.x, p.y);
      fireworkCtx.stroke();
      fireworkCtx.restore();
    });

    if (elapsed < FIREWORK_DURATION) {
      fireworkAnimationId = requestAnimationFrame(function(ts) { stepFirework(ts, shells, particles, flashes, startRef, onFirstExplosion); });
    } else {
      fireworkCanvas.classList.remove("show");
      fireworkClearTimer = setTimeout(function() {
        fireworkCtx.clearRect(0, 0, fireworkCanvas.width, fireworkCanvas.height);
      }, 400);
    }
  }

  function playFireworkEffect(onFirstExplosion) {
    if (fireworkAnimationId) cancelAnimationFrame(fireworkAnimationId);
    if (fireworkClearTimer) clearTimeout(fireworkClearTimer);

    fireworkCanvas.width = window.innerWidth;
    fireworkCanvas.height = window.innerHeight;
    var shells = createFireworkShells();
    var particles = [];
    var flashes = [];
    var startRef = { time: null, firstExplosionFired: false };

    fireworkCanvas.classList.add("show");
    fireworkAnimationId = requestAnimationFrame(function(ts) { stepFirework(ts, shells, particles, flashes, startRef, onFirstExplosion); });
  }

  var growthOverlay = document.getElementById("growth-overlay");
  var growthHideTimer = null;

  function showGrowthMessage() {
    if (growthHideTimer) clearTimeout(growthHideTimer);
    growthOverlay.classList.add("show");
    growthHideTimer = setTimeout(hideGrowthMessage, FIREWORK_DURATION + 400);
  }

  function hideGrowthMessage() {
    growthOverlay.classList.remove("show");
    if (growthHideTimer) clearTimeout(growthHideTimer);
    growthHideTimer = null;
  }

  growthOverlay.addEventListener("click", hideGrowthMessage);

  checkinBtn.addEventListener("click", function() {
    checkinBtn.disabled = true;
    checkinBtn.textContent = "更新中...";

    callAPI("action=checkin&code=" + encodeURIComponent(currentCode), function(err, result) {
      if (err || !result) {
        checkinBtn.disabled = false;
        checkinBtn.textContent = "1回受講する";
        msgEl.textContent = "通信エラーが発生しました。";
        return;
      }
      if (!result.success) {
        alert(result.message);
        checkinBtn.disabled = false;
        checkinBtn.textContent = "1回受講する";
        return;
      }
      countDisplayEl.textContent = result.newBalance;
      msgEl.textContent = "受講を受け付けました！";
      checkinBtn.style.display = "none";
      noticeEl.style.display = "block";
      if (result.newBalance === 0) {
        playFireworkEffect(showGrowthMessage);
      }
    });
  });

  codeInput.addEventListener("keydown", function(e) {
    if (e.key === "Enter") checkButton.click();
  });
</script>
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/Claude-code/sw.js');
  }
</script>
</body>
</html>
